<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="42" fill="#0D0D0D"/>
  <!-- Bird body -->
  <g transform="translate(96, 96) scale(1.15)">
    <!-- Tail feathers -->
    <path d="M 18 5 L 48 -8 L 36 5 L 48 18 Z" fill="#F0EAE0"/>
    <!-- Body -->
    <ellipse cx="5" cy="5" rx="24" ry="14" fill="#F0EAE0" transform="rotate(-8 5 5)"/>
    <!-- Upper wing -->
    <path d="M -2 -8 C -12 -28 -38 -34 -42 -22 C -24 -24 -8 -12 0 0 Z" fill="#F0EAE0"/>
    <!-- Lower wing -->
    <path d="M 0 16 C -12 32 -30 32 -36 24 C -20 24 -6 18 2 8 Z" fill="#F0EAE0"/>
    <!-- Head -->
    <circle cx="-18" cy="-6" r="12" fill="#F0EAE0"/>
    <!-- Beak -->
    <path d="M -29 -4 L -45 0 L -42 3 Z" fill="#F0EAE0"/>
    <!-- Gold branch -->
    <path d="M -43 1 C -50 -6 -54 -14 -50 -20" stroke="#C4963A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M -47 -11 L -53 -17" stroke="#C4963A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-53" cy="-18" r="3" fill="#C4963A"/>
    <path d="M -49 -15 L -52 -22" stroke="#C4963A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="-52" cy="-23" r="2.5" fill="#C4963A"/>
  </g>
</svg>
