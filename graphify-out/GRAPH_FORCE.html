<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: #080810;
    color: #e4e4e7;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ─────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 18px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
    backdrop-filter: blur(8px);
    z-index: 10;
  }

  #topbar .brand {
    font-size: 15px;
    font-weight: 600;
    color: #d4a24c;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  #topbar .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }

  #search-wrap {
    position: relative;
    flex: 1;
    max-width: 280px;
  }
  #search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 12px 6px 32px;
    color: #e4e4e7;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: rgba(212,162,76,0.6); }
  #search::placeholder { color: rgba(255,255,255,0.25); }

  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: opacity 0.15s, border-color 0.15s;
    user-select: none;
  }
  .pill.off { opacity: 0.3; }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  #stats {
    margin-left: auto;
    font-size: 11.5px;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
  }

  /* ── Canvas ──────────────────────────────── */
  #canvas {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .link {
    stroke-opacity: 0.55;
    stroke-width: 1.2;
    fill: none;
  }
  .link.faded { stroke-opacity: 0.06; }

  .node circle {
    stroke-width: 1.5;
    cursor: pointer;
    transition: r 0.1s;
  }
  .node.faded circle { opacity: 0.08; }
  .node.faded text { opacity: 0.04; }

  .node text {
    font-size: 10px;
    fill: rgba(255,255,255,0.75);
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
    font-weight: 500;
  }
  .node.hub text { font-size: 11px; font-weight: 600; fill: #fff; }

  /* ── Tooltip ─────────────────────────────── */
  #tooltip {
    position: fixed;
    background: rgba(10,10,18,0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    max-width: 280px;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    z-index: 100;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-name { font-weight: 600; color: #fff; margin-bottom: 4px; word-break: break-all; }
  #tooltip .tt-file { color: rgba(255,255,255,0.4); font-size: 10.5px; margin-bottom: 4px; word-break: break-all; }
  #tooltip .tt-meta { display: flex; gap: 12px; }
  #tooltip .tt-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 7px; border-radius: 4px; font-size: 10.5px;
    background: rgba(255,255,255,0.08);
  }
  #tooltip .tt-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── Legend ──────────────────────────────── */
  #legend {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: rgba(10,10,18,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    backdrop-filter: blur(10px);
  }
  #legend .leg-title { font-size: 10px; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
  .leg-item { display: flex; align-items: center; gap: 7px; color: rgba(255,255,255,0.6); }
  .leg-line { width: 20px; height: 2px; border-radius: 2px; }
  .leg-circle { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── Hint ────────────────────────────────── */
  #hint {
    position: absolute;
    bottom: 16px;
    left: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    line-height: 1.7;
  }
</style>

st","relation":"calls"},{"source":"components_change_password_form_changepasswordform","target":"hooks_use_toast_usetoast","relation":"calls"},{"source":"components_push_section_pushsection","target":"hooks_use_toast_usetoast","relation":"calls"},{"source":"components_staff_timesheet_timeform","target":"hooks_use_toast_usetoast","relation":"calls"},{"source":"respond_route_post","target":"lib_push_sendpushtomanagers","relation":"calls"},{"source":"src_app_api_employees_id_route_ts_id_route_get","target":"lib_crypto_decryptpassportdata","relation":"calls"},{"source":"src_app_api_employees_id_route_ts_id_route_patch","target":"lib_utils_normalizephone","relation":"calls"},{"source":"src_app_api_employees_id_route_ts_id_route_patch","target":"lib_crypto_encryptpassportdata","relation":"calls"},{"source":"employees_route_post","target":"lib_utils_normalizephone","relation":"calls"},{"source":"employees_route_post","target":"lib_crypto_encryptpassportdata","relation":"calls"},{"source":"assignmentid_route_delete","target":"lib_push_sendpushtoemployee","relation":"calls"},{"source":"invite_route_post","target":"lib_push_sendpushtomany","relation":"calls"},{"source":"test_route_post","target":"lib_push_sendpushtoemployee","relation":"calls"},{"source":"vapid_public_key_route_get","target":"lib_push_getvapidpublickey","relation":"calls"},{"source":"events_event_card_eventcard","target":"lib_utils_cn","relation":"calls"},{"source":"events_staffing_bar_staffingbar","target":"lib_utils_cn","relation":"calls"},{"source":"layout_logo_magnifiquelogo","target":"lib_utils_cn","relation":"calls"},{"source":"push_push_subscribe_button_pushsubscribebutton","target":"hooks_use_toast_usetoast","relation":"calls"},{"source":"ui_badge_badge","target":"lib_utils_cn","relation":"calls"},{"source":"ui_dialog_dialogheader","target":"lib_utils_cn","relation":"calls"},{"source":"ui_dialog_dialogfooter","target":"lib_utils_cn","relation":"calls"},{"source":"ui_toaster_toaster","target":"hooks_use_toast_usetoast","relation":"calls"},{"source":"lib_utils_cn","target":"package_dependencies_clsx","relation":"calls"}]};

let allNodes = RAW.nodes;
let allLinks = RAW.links;

// Track which modules are visible
const visibleModules = new Set(Object.keys(MODULE_COLOR));

// ── DOM refs ──────────────────────────────────────────────────────────
const svgEl   = document.getElementById('svg');
const tooltip = document.getElementById('tooltip');
const statsEl = document.getElementById('stats');
const search  = document.getElementById('search');

// ── SVG setup ─────────────────────────────────────────────────────────
const svg = d3.select('#svg');
const g   = svg.append('g').attr('class', 'root');

svg.call(
  d3.zoom()
    .scaleExtent([0.08, 6])
    .on('zoom', e => g.attr('transform', e.transform))
);

svg.on('dblclick.zoom', null);
svg.on('dblclick', () => resetHighlight());

// ── Build module filter pills ─────────────────────────────────────────
const pillsEl = document.getElementById('mod-pills');
Object.keys(MODULE_COLOR).forEach(mod => {
  const count = allNodes.filter(n => n.module === mod).length;
  if (count === 0) return;
  const p = document.createElement('div');
  p.className = 'pill';
  p.style.borderColor = MODULE_COLOR[mod] + '55';
  p.style.background   = MODULE_COLOR[mod] + '18';
  p.innerHTML = `<span class="dot" style="background:${MODULE_COLOR[mod]}"></span>${MODULE_LABEL[mod]} <span style="opacity:.5">${count}</span>`;
  p.dataset.mod = mod;
  p.addEventListener('click', () => toggleModule(mod, p));
  pillsEl.appendChild(p);
});

function toggleModule(mod, el) {
  if (visibleModules.has(mod)) {
    visibleModules.delete(mod);
    el.classList.add('off');
  } else {
    visibleModules.add(mod);
    el.classList.remove('off');
  }
  rebuild();
}

// ── Filter + Simulation ───────────────────────────────────────────────
let simulation, linkSel, nodeSel, highlighted = null;

function getVisibleData() {
  const q = search.value.toLowerCase().trim();
  const visNodes = allNodes.filter(n => {
    if (!visibleModules.has(n.module)) return false;
    if (q) {
      const haystack = (n.label + ' ' + (n.file || '')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
  const visIds = new Set(visNodes.map(n => n.id));
  const visLinks = allLinks.filter(l =>
    visIds.has(typeof l.source === 'object' ? l.source.id : l.source) &&
    visIds.has(typeof l.target === 'object' ? l.target.id : l.target)
  );
  return { visNodes, visLinks };
}

function rebuild() {
  g.selectAll('*').remove();
  if (simulation) simulation.stop();
  highlighted = null;

  const { visNodes, visLinks } = getVisibleData();

  statsEl.textContent = `${visNodes.length} узлов · ${visLinks.length} связей`;

  const w = svgEl.clientWidth, h = svgEl.clientHeight;

  simulation = d3.forceSimulation(visNodes)
    .force('link', d3.forceLink(visLinks).id(d => d.id).distance(d => {
      // longer distance for external nodes
      if (d.source.module === 'external' || d.target.module === 'external') return 80;
      return 55;
    }).strength(0.4))
    .force('charge', d3.forceManyBody().strength(d => -100 - d.degree * 4).distanceMax(300))
    .force('center', d3.forceCenter(w / 2, h / 2))
    .force('collision', d3.forceCollide().radius(d => nodeR(d) + 4))
    .alphaDecay(0.025);

  // Links
  linkSel = g.append('g')
    .selectAll('line')
    .data(visLinks)
    .join('line')
    .attr('class', 'link')
    .attr('stroke', d => LINK_COLOR[d.relation] || '#aaa')
    .attr('marker-end', d => `url(#arr-${d.relation})`);

  // Arrowhead markers
  const defs = svg.select('defs').empty() ? svg.append('defs') : svg.select('defs');
  Object.entries(LINK_COLOR).forEach(([rel, color]) => {
    if (defs.select(`#arr-${rel}`).empty()) {
      defs.append('marker')
        .attr('id', `arr-${rel}`)
        .attr('markerWidth', 6).attr('markerHeight', 6)
        .attr('refX', 14).attr('refY', 3)
        .attr('orient', 'auto')
        .append('path')
        .attr('d', 'M0,0 L0,6 L6,3 z')
        .attr('fill', color).attr('opacity', 0.7);
    }
  });

  // Nodes
  nodeSel = g.append('g')
    .selectAll('.node')
    .data(visNodes)
    .join('g')
    .attr('class', d => 'node' + (d.degree > 15 ? ' hub' : ''))
    .call(drag(simulation))
    .on('mouseenter', onHover)
    .on('mouseleave', offHover)
    .on('click', (e, d) => { e.stopPropagation(); highlightNode(d); });

  nodeSel.append('circle')
    .attr('r', nodeR)
    .attr('fill', d => MODULE_COLOR[d.module] || '#888')
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => MODULE_COLOR[d.module] || '#888')
    .attr('stroke-opacity', 0.6);

  // Label only for hubs (degree > 8) or external libs
  nodeSel.filter(d => d.degree > 8)
    .append('text')
    .attr('dy', d => nodeR(d) + 10)
    .text(d => shortLabel(d.label))
    .style('fill', d => MODULE_COLOR[d.module])
    .style('font-size', d => d.degree > 20 ? '10px' : '9px')
    .style('opacity', 0.9)
    .attr('text-anchor', 'middle');

  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function nodeR(d) {
  return Math.max(4, Math.min(20, 4 + Math.sqrt(d.degree || 1) * 2.2));
}

function shortLabel(label) {
  if (!label) return '';
  const s = label.replace(/\.tsx?$/, '').replace(/\.jsx?$/, '');
  return s.length > 20 ? s.slice(0, 18) + '…' : s;
}

// ── Drag ──────────────────────────────────────────────────────────────
function drag(sim) {
  return d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
}

// ── Highlight ─────────────────────────────────────────────────────────
function highlightNode(d) {
  if (highlighted === d.id) { resetHighlight(); return; }
  highlighted = d.id;

  const neighborIds = new Set([d.id]);
  allLinks.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s === d.id) neighborIds.add(t);
    if (t === d.id) neighborIds.add(s);
  });

  nodeSel.classed('faded', n => !neighborIds.has(n.id));
  linkSel.classed('faded', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s !== d.id && t !== d.id;
  });
}

function resetHighlight() {
  highlighted = null;
  nodeSel?.classed('faded', false);
  linkSel?.classed('faded', false);
}

// ── Tooltip ───────────────────────────────────────────────────────────
function onHover(e, d) {
  const color = MODULE_COLOR[d.module] || '#888';
  tooltip.innerHTML = `
    <div class="tt-name">${d.label || d.id}</div>
    ${d.file ? `<div class="tt-file">${d.file}</div>` : ''}
    <div class="tt-meta">
      <span class="tt-badge"><span class="tt-dot" style="background:${color}"></span>${MODULE_LABEL[d.module] || d.module}</span>
      <span class="tt-badge">degree: ${d.degree}</span>
    </div>`;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function offHover() {
  tooltip.classList.remove('visible');
}

svgEl.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) moveTooltip(e);
});

function moveTooltip(e) {
  const x = e.clientX + 14, y = e.clientY - 8;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  const wx = window.innerWidth, wy = window.innerHeight;
  tooltip.style.left = (x + tw > wx ? x - tw - 28 : x) + 'px';
  tooltip.style.top  = (y + th > wy ? y - th        : y) + 'px';
}

// ── Search ────────────────────────────────────────────────────────────
let searchTimeout;
search.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(rebuild, 200);
});

// ── Init ──────────────────────────────────────────────────────────────
rebuild();

// Auto-fit after simulation settles
setTimeout(() => {
  const bounds = g.node().getBBox();
  if (!bounds.width) return;
  const w = svgEl.clientWidth, h = svgEl.clientHeight;
  const scale = 0.85 / Math.max(bounds.width / w, bounds.height / h);
  const tx = (w - scale * bounds.width)  / 2 - scale * bounds.x;
  const ty = (h - scale * bounds.height) / 2 - scale * bounds.y;
  svg.transition().duration(800).call(
    d3.zoom().transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}, 3500);
</script>
